<!DOCTYPE html>
<html lang="en">
<head>
  <title>TestCart Pro - Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo" style="color: #fff; text-decoration: none;">TestCart Pro</a>
    <nav id="main-nav"><a href="index.html">Home</a></nav>
  </header>
  <div class="form-container">
    <h2>Register</h2>
    <form>
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">Already have an account? <a href="login.html">Login</a></p>
  </div>
  <script src="js/app.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
