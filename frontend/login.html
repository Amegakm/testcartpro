<!DOCTYPE html>
<html lang="en">
<head>
  <title>TestCart Pro - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo" style="color: #fff; text-decoration: none;">TestCart Pro</a>
    <nav id="main-nav"><a href="index.html">Home</a></nav>
  </header>
  <div class="form-container">
    <h2>Login</h2>
    <form>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <div style="margin-top: 20px; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 15px;">
      <p style="margin-bottom: 10px;">Don't have an account?</p>
      <button type="button" onclick="window.location.href='register.html'" style="width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer;">Register Now</button>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
