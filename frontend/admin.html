<!DOCTYPE html>
<html lang="en">
<head>
  <title>TestCart Pro - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo" style="color: #fff; text-decoration: none;">TestCart Pro ADMIN</a>
    <nav id="main-nav"><a href="index.html">Home</a></nav>
  </header>
  
  <div class="form-container" style="margin-top: 40px;">
    <h2>Add New Product</h2>
    <form>
      <input type="text" id="p_name" placeholder="Product Name" required>
      <input type="number" id="p_price" placeholder="Price (INR)" required>
      <input type="text" id="p_image" placeholder="Image URL">
      <input type="text" id="p_desc" placeholder="Description">
      <button type="submit" class="btn btn-green" style="width: 100%">Publish</button>
    </form>
  </div>

  <h2 style="text-align: center;">Manage Orders</h2>
  <div id="admin-orders" style="max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px;"></div>

  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
